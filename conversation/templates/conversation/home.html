<!DOCTYPE html>
<html>
<head>
    <title>Conversation — Silent Talk</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        *  { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #080c10;
            color: #e8f0f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }
        .sub { color: #8899aa; margin-bottom: 2.5rem; font-size: 0.95rem; }
        .card {
            background: #141c26;
            border: 1px solid #1e2d40;
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .room-code {
            font-family: 'DM Mono', monospace;
            font-size: 2.5rem;
            font-weight: 500;
            color: #00d4ff;
            letter-spacing: 0.2em;
            background: rgba(0,212,255,0.06);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 12px;
            padding: 1rem 2rem;
            margin: 1rem 0 0.5rem;
            display: block;
        }
        .room-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: #4a6070;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            margin-bottom: 10px;
            transition: all 0.2s;
            text-decoration: none;
            text-align: center;
        }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-primary:hover { background: #fff; }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: #4a6070;
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1e2d40;
        }
        .join-row {
            display: flex;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #1e2d40;
            border-radius: 10px;
            color: #e8f0f8;
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            outline: none;
        }
        input:focus { border-color: #00d4ff; }
        .join-btn {
            padding: 12px 20px;
            background: #1a2436;
            border: 1px solid #1e2d40;
            border-radius: 10px;
            color: #e8f0f8;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .join-btn:hover { border-color: #00d4ff; color: #00d4ff; }
    </style>
</head>
<body>
    <h1>Conversation Mode</h1>
    <p class="sub">Real-time signing + text communication</p>

    <div class="card">
        <div class="room-label">Your room code</div>
        <span class="room-code" id="roomCodeDisplay">{{ room_name }}</span>
        <p style="font-size:0.82rem;color:#8899aa;margin-bottom:1.5rem;">
            Share this code with the other person. Both of you open the same room.
        </p>
        <a class="btn btn-primary" href="/conversation/{{ room_name }}/">
            Open Room → {{ room_name }}
        </a>

        <div class="divider">or join existing room</div>

        <div class="join-row">
            <input type="text" id="joinCode" placeholder="enter room code" maxlength="6">
            <button class="join-btn" onclick="joinRoom()">Join</button>
        </div>
    </div>

    <script>
    function joinRoom() {
        const code = document.getElementById('joinCode').value.trim().toLowerCase();
        if (code.length < 4) { alert('Enter a valid room code'); return; }
        window.location.href = `/conversation/${code}/`;
    }
    document.getElementById('joinCode').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') joinRoom();
    });
    </script>
</body>
</html>
